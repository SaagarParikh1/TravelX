<!DOCTYPE html>
<html>
<head>
  <title>Top Things to Do</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
  <style>
    body {
      background: url('https://i.pinimg.com/originals/d9/5e/09/d95e0951aacb25246d2fda9373194918.jpg') center center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      color: #fff;
    }

    h1 {
      font-size: 60px;
    }

    .activities-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      grid-gap: 20px;
      margin-top: 20px;
      padding: 20px;
    }

    .activity {
      width: 100%;
      height: 200px;
      overflow: hidden;
      border-radius: 5px;
    }

    .activity img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
    }

  </style>
  <script>
    const clientId = '1XCPFRHMZEU2EKDREQHM0E1LSV5N1IUEQAVTHMZK42LD0SOU'; // Replace with your Foursquare API client ID
    const clientSecret = '5ET2RT2VPUUKC5FIIEPCY4AGCZVG4XNEHEZK2CCEBE3GWYMP'; // Replace with your Foursquare API client secret

    function displaySavedLocation() {
      var savedLocation = localStorage.getItem("savedLocation");
      if (savedLocation) {
        var capitalizedLocation = savedLocation.charAt(0).toUpperCase() + savedLocation.slice(1);
        document.getElementById("location").textContent = capitalizedLocation;
        fetchThingsToDo(capitalizedLocation);
      }
    }

    function fetchThingsToDo(location) {
      const endpoint = `https://api.foursquare.com/v2/venues/explore`;

      const params = {
        client_id: clientId,
        client_secret: clientSecret,
        near: location,
        v: '20220101',
        limit: 10,
      };

      const queryString = new URLSearchParams(params).toString();
      const url = `${endpoint}?${queryString}`;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          console.log(data); // Output the response data to the console for inspection

          const groups = data.response.groups;

          if (groups && groups.length > 0) {
            const items = groups[0].items;

            if (items && items.length > 0) {
              const activities = items.map(item => {
                const venue = item.venue;
                return {
                  name: venue.name,
                  image: `${venue.categories[0].icon.prefix}bg_64${venue.categories[0].icon.suffix}`,
                };
              });

              displayActivities(activities);
            } else {
              console.log('No items found in the response data.');
            }
          } else {
            console.log('No groups found in the response data.');
          }
        })
        .catch(error => {
          console.log('Error fetching things to do data:', error);
        });
    }

    function displayActivities(activities) {
      var activitiesListContainer = document.getElementById("activitiesListContainer");
      activitiesListContainer.innerHTML = '';

      activities.forEach(function (activity) {
        var activityElement = document.createElement("div");
        activityElement.classList.add("activity");

        var imgElement = document.createElement("img");
        imgElement.src = activity.image;
        imgElement.alt = activity.name;

        activityElement.appendChild(imgElement);
        activitiesListContainer.appendChild(activityElement);
      });
    }

    function updateLocation() {
      var locationInput = document.getElementById("locationInput");
      var location = locationInput.value;
      location = location.charAt(0).toUpperCase() + location.slice(1);
      localStorage.setItem("savedLocation", location);
      document.getElementById("location").textContent = location;
      fetchThingsToDo(location);
    }
  </script>
</head>
<body onload="displaySavedLocation()">
  <header>
    <nav>
      <img class="logo" src="travelx.png" alt="Logo">
      <ul>
        <li><a href="mainpage.html">Main Page</a></li>
        <li><a href="weatherinfo.html">Weather Info</a></li>
        <li><a href="imagesofloc.html">Images of Location</a></li>
        <li><a href="thingstodo.html">Things to Do</a></li> 
        <li><a href="questions.html">Questions</a></li> 
      </ul>
    </nav>
  </header>
  <main>
    <h1>Things To Do In <span id="location"></span></h1>
    <div class="location-bar">
      <form onsubmit="updateLocation(); return false;">
        <input type="text" id="locationInput" placeholder="Enter a location">
        <input type="submit" value="Change">
      </form>
    </div>
    <div class="activities-list" id="activitiesListContainer"></div>
  </main>
</body>
</html>
